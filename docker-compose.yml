# docker-compose.yml : Site principal Kiwinet — VPS Scaleway
# Projet  : Kiwinet
# Cible   : Debian x86_64 (Scaleway STARDUST1-S, fr-par-1)
# Image   : ghcr.io/rookain-kiwi/kiwinet-web (Astro + Nginx Alpine)
# CI/CD   : GitHub Actions → GHCR → déploiement SSH automatique

# ─────────────────────────────────────────────────────────────────────────────
# SERVICES
# ─────────────────────────────────────────────────────────────────────────────
services:

  website:
    image: ghcr.io/rookain-kiwi/kiwinet-web:latest
    container_name: kiwinet-web
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kiwinet-web.rule=Host(`kiwinet.me`) || Host(`www.kiwinet.me`)"
      - "traefik.http.routers.kiwinet-web.entrypoints=websecure"
      - "traefik.http.routers.kiwinet-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.kiwinet-web.loadbalancer.server.port=80"
      - "traefik.http.routers.kiwinet-web.middlewares=secure-headers@file,rate-limit@file"

# ─────────────────────────────────────────────────────────────────────────────
# RÉSEAU
# ─────────────────────────────────────────────────────────────────────────────
networks:
  proxy:
    external: true
