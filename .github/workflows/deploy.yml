# deploy.yml : Pipeline CI/CD — build image Docker ARM64 et déploiement SSH sur la VM
# Déclenché à chaque push sur main. Build multi-plateforme via Docker Buildx (linux/arm64).

name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configurer QEMU pour le build ARM64
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. Configurer Docker Buildx (moteur multi-plateforme)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Se connecter à GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # 5. Builder et pousser l'image ARM64
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/rookain-kiwi/kiwinet-web:latest
            ghcr.io/rookain-kiwi/kiwinet-web:${{ github.sha }}   # Tag immuable par commit pour rollback

      # 6. Déployer sur la VM via SSH
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/traefik
            docker compose pull kiwinet-web
            docker compose up -d kiwinet-web