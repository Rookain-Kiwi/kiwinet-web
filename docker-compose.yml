# docker-compose.yml : Service web kiwinet.me — conteneur Nginx servi derrière Traefik.
# Utilisé en production sur VM ARM64. Image buildée et poussée par le CI/CD GitHub Actions.

services:
  website:
    image: ghcr.io/rookain-kiwi/kiwinet-web:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - proxy   # Réseau Docker partagé avec Traefik pour le routage interne
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.website.rule=Host(`kiwinet.me`)"
      - "traefik.http.routers.website.entrypoints=websecure"   # HTTPS uniquement — port 443
      - "traefik.http.routers.website.tls.certresolver=letsencrypt"   # SSL auto via Let's Encrypt
      - "traefik.http.services.website.loadbalancer.server.port=80"
      - "traefik.http.routers.website.middlewares=secure-headers@file"   # Headers de sécurité définis dans dynamic.yml

networks:
  proxy:
    external: true   # Réseau créé et géré par la stack Traefik — ne pas recréer ici