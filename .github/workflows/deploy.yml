# deploy.yml : Pipeline CI/CD — build image Docker AMD64 et déploiement SSH sur VPS Scaleway
# Déclenché à chaque push sur main. Build via Docker Buildx (linux/amd64).
name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configurer Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Se connecter à GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # 4. Builder et pousser l'image AMD64
      # Deux tags poussés : latest (commodité) et SHA du commit (rollback immuable)
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/rookain-kiwi/kiwinet-web:latest
            ghcr.io/rookain-kiwi/kiwinet-web:${{ github.sha }}

      # 5. Déployer sur le VPS Scaleway via SSH
      # Le VPS tire le repo kiwinet-web puis redémarre le container
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            cd /opt/kiwinet-web
            git pull
            docker compose pull website
            docker compose up -d website